# ============================================================================
#  picca_delta_extraction — explanatory configuration file (DESI defaults)
# ============================================================================
#
# This file documents EVERY option understood by picca.delta_extraction, with
# the explanations taken from the tutorial notebook
#   tutorials/delta_extraction/picca_delta_extraction_configuration_tutorial.ipynb
# The active (uncommented) values are sensible defaults for a DESI Lyman-alpha
# delta-field run. Alternative classes / options are kept as comments so this
# file doubles as a reference.
#
# The notebook is slightly out of date in a few places; where it disagreed with
# the current picca source the source wins and the divergence is flagged with
# "[NOTE]". Known cases: the data argument is `save format` (not `format`); the
# default logging level is PROGRESS (not DEBUG); Dr16ExpectedFlux `limit eta`
# defaults to 0.5,1.5 (not 0.1,1.5); and `unblind` is no longer a recognised
# option. Options present in the code but absent from the notebook are listed
# under "[EXTRA]" blocks.
#
# Usage:
#   python bin/picca_delta_extraction.py desi_config_explanatory.ini
#
# Notes on the format:
#   * Sections are declared between square brackets, e.g. [general].
#   * Arguments are "key = value". Strings, ints, floats and bools are all
#     written the same way (booleans accept True/False or yes/no).
#   * Arguments and sections are not ordered, but all arguments of a section
#     must appear before the next section begins.
#   * Unknown arguments are silently ignored.
#   * Environment variables in argument values are expanded before use.
#   * The configuration actually used by a run is dumped to .config.ini in the
#     output folder, so a past run can always be inspected.
#
# Mandatory sections: [general] [data] [corrections] [masks] [expected flux]
# ============================================================================


# ============================================================================
# [general] — common options not tied to a specific class
# ============================================================================
[general]

# out dir: where to save the results.
#   Type: str, Required: yes
out dir = $DESI_DELTA_OUT/Delta_lya/

# overwrite: allow overwriting results from a previous run. If False the code
# crashes when the output folder already contains results.
#   Type: bool, Required: no, Default: False
overwrite = False

# log: if a log file name is passed, messages are also printed there.
#   Type: str, Required: no, Default: run.log
log = run.log

# logging level console: controls console messages. One of CRITICAL, ERROR,
# WARNING_OK, WARNING, INFO, PROGRESS, DEBUG, NOTSET.
#   Type: str, Required: no, Default: PROGRESS
#   [NOTE] notebook says the default is DEBUG; the source default is PROGRESS.
logging level console = PROGRESS

# logging level file: controls log-file messages. Same allowed values as above.
# Ignored if `log` is None.
#   Type: str, Required: no, Default: PROGRESS
#   [NOTE] notebook says the default is DEBUG; the source default is PROGRESS.
logging level file = PROGRESS

# num processors: number of processors for multiprocessed tasks (data I/O,
# expected flux). 0 uses half the processes available on the machine.
#   Type: int or None, Required: no, Default: 0
num processors = 0


# ============================================================================
# [data] — which data are loaded and the wavelength / forest cuts
# ============================================================================
[data]

# type: name of the class used to load the data. Any data type in the folder
# py/picca/delta_extraction/data/. For DESI: DesiHealpix, DesisimMocks,
# DesiTile. For SDSS: SdssData.
#   Type: str, Required: yes
type = DesiHealpix

# module name: file containing the data type. Normally unnecessary if the file
# follows the naming convention.
#   Type: str, Required: no
# module name =

# analysis type: selected analysis. Options "BAO 3D" or "PK 1D".
#   Type: str, Required: no, Default: "BAO 3D"
analysis type = BAO 3D

# input directory: directory with the spectra files.
#   Type: str, Required: yes
input directory = /global/cfs/cdirs/desi/spectro/redux/iron/healpix/

# save format: format to store deltas with. Options "ImageHDU" or "BinTableHDU".
#   Type: str, Required: no, Default: "ImageHDU"
#   [NOTE] the notebook calls this argument `format`; the source name is
#   `save format`. Using `format` is silently ignored.
save format = BinTableHDU

# lambda abs IGM: wavelength of the IGM absorber. Must be a key of ABSORBER_IGM
# in delta_extraction/utils.py. Used only if `analysis type` is "PK 1D".
#   Type: str, Required: no, Default: LYA
lambda abs IGM = LYA

# lambda max: upper limit on observed wavelength [Angstrom].
#   Type: float, Required: no, Default: 5500.0
lambda max = 5500.0

# lambda max rest frame: upper limit on rest-frame wavelength [Angstrom].
#   Type: float, Required: no, Default: 1200.0
lambda max rest frame = 1200.0

# lambda min: lower limit on observed wavelength [Angstrom].
#   Type: float, Required: no, Default: 3600.0
lambda min = 3600.0

# lambda min rest frame: lower limit on rest-frame wavelength [Angstrom].
#   Type: float, Required: no, Default: 1040.0
lambda min rest frame = 1040.0

# minimal snr: minimal S/N ratio required for forests to be accepted.
#   Type: float, Required: no,
#   Default: 0 for analysis type == BAO 3D, 1 for analysis type == PK 1D
# minimal snr = 0

# minimum number pixels in forest: forests with fewer pixels are dropped.
#   Type: int, Required: no, Default: 50
minimum number pixels in forest = 50

# max num spec: maximum number of spectra to read. None for no maximum.
#   Type: int or None, Required: no, Default: None
# max num spec = None

# rejection log file: filename of the rejection log. Extension .fits or
# .fits.gz.
#   Type: str, Required: no, Default: "rejection_log.fits.gz"
rejection log file = rejection_log.fits.gz

# z max: maximum redshift. Quasars with z >= z_max are discarded. If not set it
# is computed at runtime from `lambda max` and `lambda min rest frame` as
#   z_max = max(0, lambda_max / lambda_min_rf - 1).
#   Type: float, Required: no
# z max =

# z min: minimum redshift. Quasars with z < z_min are discarded. If not set it
# is computed at runtime from `lambda min` and `lambda max rest frame` as
#   z_min = max(0, lambda_min / lambda_max_rf - 1).
#   Type: float, Required: no
# z min =

# ---- Arguments specific to the selected data `type` ------------------------
#
# DesiHealpix (selected above) — also valid for DesisimMocks and DesiTile,
# which share the same arguments:

# catalogue: name of the quasar catalogue.
#   Type: str, Required: yes
catalogue = /global/cfs/cdirs/desi/science/lya/early-3d/catalogs/QSO_cat_iron_main_dark_healpix_v0.fits

# delta lambda: wavelength step (in Angstrom) between two pixels. Ignored
# unless `wave solution` is "lin".
#   Type: float, Required: no, Default: 0.8
delta lambda = 0.8

# delta log lambda: step of log10(wavelength) between two pixels. Ignored
# unless `wave solution` is "log".
#   Type: float, Required: no, Default: 3e-4
# delta log lambda = 3e-4

# keep surveys: keep only catalogue entries whose "SURVEY" is in this field.
# Ignored if no "SURVEY" column. Multiple values separated by whitespace.
# "all" == "sv1 sv2 sv3 main". Accepted: sv1, sv2, sv3, main, all, special.
#   Type: str, Required: no, Default: "all"
keep surveys = main

# unblind: the notebook lists this ("do not blind deltas"), but it is NOT a
# recognised option in the current source (blinding is handled internally based
# on the catalogue/data release), so it is left out of the active config to
# avoid a silently-ignored argument.
#   [NOTE] removed relative to the notebook.

# wave solution: linear ("lin") or logarithmic ("log") wavelength solution.
#   Type: str, Required: no, Default: "lin"
wave solution = lin

# delta lambda rest frame: rest-frame wavelength step (Angstrom). Used to set
# the rest-frame grid when relevant.
#   Type: float, Required: no
# delta lambda rest frame =

# [EXTRA] DESI-only options accepted by the source but not in the notebook:
# use non-coadded spectra: read per-exposure spectra instead of coadds. Much
# slower I/O; needed for some PK 1D / single-exposure studies.
#   Type: bool, Required: no, Default: False
# use non-coadded spectra = False
# uniquify night targetid: make (night, targetid) unique when reading.
#   Type: bool, Required: no, Default: False
# uniquify night targetid = False
# keep single exposures: keep individual exposures rather than coadding them.
#   Type: bool, Required: no, Default: False
# keep single exposures = False

# ---- SdssData arguments (only if type = SdssData; always wave solution=log) -
# best obs: if True, read only the best observation for repeated objects.
#   Type: bool, Required: no, Default: False
# best obs = False
# BI max: maximum Balnicity Index to keep the quasar. None for no maximum.
#   Type: float or None, Required: no, Default: None
# BI max = None
# drq catalogue: name of the quasar catalogue (DRQ format).
#   Type: str, Required: yes
# drq catalogue =
# keep BAL: if False, remove quasars flagged with a Broad Absorption Line.
# Ignored if BI max is not None.
#   Type: bool, Required: no, Default: False
# keep BAL = False
# mode: reading mode. Supported: "spplate" and "spec".
#   Type: str, Required: no, Default: "spplate"
# mode = spplate
# rebin: combine this many adjacent pixels (ivar weight) on the wavelength grid.
#   Type: int, Required: no, Default: 3
# rebin = 3
# spAll: path to the spAll file for multiple observations. If not given it is
# looked up via `input directory`.
#   Type: str, Required: no
# spAll =


# ============================================================================
# [corrections] — corrections applied to the data (mostly SDSS-specific)
# ============================================================================
# Each correction's arguments go in their own [correction arguments N] section,
# because different corrections may need same-named arguments.
[corrections]

# num corrections: number of corrections. 0 loads none.
#   Type: non-negative int, Required: yes
num corrections = 0

# type 0, type 1, ... type n-1: name of each correction. Any class in
# py/picca/delta_extraction/corrections/. Required only for indices below
# `num corrections`.
#   Type: str
# type 0 = SdssCalibrationCorrection

# module name 0, ... module name n-1: file containing the correction type.
# Normally unnecessary if it follows the naming convention.
#   Type: str, Required: no
# module name 0 =

# ---- Available corrections and their [correction arguments N] sections ------
#
# SdssCalibrationCorrection
#   filename: file with multiplicative errors in the pipeline flux calibration.
#   Must contain extension STACK_DELTAS with fields 'LOGLAM' and 'STACK'.
#     Type: str, Required: yes
# [correction arguments 0]
# filename =
#
# SdssDustCorrection
#   filename: DRQ catalog of objects for the dust map (Schlegel correction).
#   Must contain extension EXTINCTION with fields 'THING_ID' and 'EXTINCTION'.
#     Type: str, Required: yes
# [correction arguments 0]
# filename =
#
# SdssIvarCorrection
#   filename: fits file with multiplicative errors in the ivar calibration.
#   Must contain extension VAR_FUNC with fields 'LOGLAM' and 'STACK'.
#     Type: str, Required: yes
# [correction arguments 0]
# filename =
#
# SdssOpticalDepthCorrection (all three lists must have equal length)
#   optical depth tau: whitespace list of tau for each optical-depth absorber.
#     Type: list of float, Required: yes
#   optical depth gamma: whitespace list of gamma for each absorber.
#     Type: list of float, Required: yes
#   optical depth absorber: whitespace list of absorber names; names must match
#   species in ABSORBER_IGM in py/picca/delta_extraction/utils.py.
#     Type: list of string, Required: yes
# [correction arguments 0]
# optical depth tau =
# optical depth gamma =
# optical depth absorber =


# ============================================================================
# [masks] — masks applied to the data
# ============================================================================
# Built like [corrections]: each mask's arguments go in [mask arguments N].
[masks]

# num masks: number of masks. 0 loads none.
#   Type: non-negative int, Required: yes
num masks = 0

# keep pixels: if True, masking only sets ivar=0; otherwise pixels are dropped.
#   Type: bool, Required: no, Default: False
# keep pixels = False

# type 0, ... type n-1: name of each mask. Any class in
# py/picca/delta_extraction/corrections/. Required only for indices below
# `num masks`.
#   Type: str
# type 0 = DlaMask
# type 1 = BalMask

# module name 0, ... module name n-1: file containing the mask type. Normally
# unnecessary if it follows the naming convention.
#   Type: str, Required: no
# module name 0 =

# ---- Available masks and their [mask arguments N] sections ------------------
#
# AbsorberMask
#   absorber mask width: mask half-width around the absorber central observed
#   wavelength, in units of 1e4*dlog10(lambda).
#     Type: float, Required: no, Default: 2.5
#   filename: absorber catalog file.
#     Type: str, Required: yes
#   los_id name: line-of-sight identifier (THING_ID in SDSS, TARGETID in DESI).
#     Type: str, Required: no, Default: THING_ID
# [mask arguments 0]
# absorber mask width = 2.5
# filename =
# los_id name = TARGETID
#
# BalMask
#   bal index type: 'ai' or 'bi'; sets which velocity the BAL mask uses.
#     Type: str, Required: no, Default: 'ai'
#   filename: BAL catalog file.
#     Type: str, Required: yes
#   los_id name: line-of-sight identifier.
#     Type: str, Required: no, Default: THING_ID
# [mask arguments 0]
# bal index type = ai
# filename =
# los_id name = TARGETID
#
# DlaMask
#   dla mask limit: lower limit on the DLA transmission; below it pixels are
#   masked.
#     Type: float, Required: no, Default: 0.8
#   filename: DLA catalog file.
#     Type: str, Required: yes
#   los_id name: line-of-sight identifier.
#     Type: str, Required: no, Default: THING_ID
#   mask file: file of regions to mask in lambda_RF. Each line:
#     'region_name region_min region_max RF_DLA'  (wavelengths in Angstrom).
#     Type: str, Required: no
# [mask arguments 0]
# dla mask limit = 0.8
# filename =
# los_id name = TARGETID
# mask file =


# ============================================================================
# [expected flux] — continuum + mean transmission, i.e. the delta extraction
# ============================================================================
[expected flux]

# type: class used to extract the deltas. Any class in
# py/picca/delta_extraction/expected_fluxes/ (Dr16ExpectedFlux,
# Dr16FixedEta..., ContinuumVarianceExpectedFlux, TrueContinuum, ...).
#   Type: str, Required: yes
type = Dr16ExpectedFlux

# module name: file containing the expected flux type. Normally unnecessary if
# it follows the naming convention.
#   Type: str, Required: no
# module name =

# num processors: processors used to compute the mean continua and to read in
# data for DesiHealpix-based modes. 0 uses half the available cores.
#   Type: int, Required: no, Default: 0
num processors = 0

# var lss mod: modifying factor applied to sigma_LSS when computing weights.
# Weights = 1 / (eta*sigma_pipe + var_lss_mod*sigma_LSS + fudge/sigma_pipe).
#   Type: float, Required: no, Default: 1.0
var lss mod = 1.0

# ---- Arguments specific to the selected expected-flux `type` ----------------
#
# Dr16ExpectedFlux (selected above):

# force stack delta to zero: if True, the continuum is corrected by stack_delta.
#   Type: bool, Required: no, Default: True
force stack delta to zero = True

# iter out prefix: prefix of the iteration files holding the statistical
# properties of deltas at each iteration. Intermediate steps append
# '_iteration{num}.fits.gz', the final one '.fits.gz'. Must contain no folders.
#   Type: str, Required: no, Default: delta_attributes
iter out prefix = delta_attributes

# limit eta: limits on the eta function. Format "minimum,maximum".
#   Type: list of float, Required: no, Default: 0.5,1.5
#   [NOTE] notebook says 0.1,1.5; the source default is 0.5,1.5.
limit eta = 0.5,1.5

# limit var lss: limits on the var_lss function. Format "minimum,maximum".
#   Type: list of float, Required: no, Default: 0.0,0.3
limit var lss = 0.0,0.3

# num bins variance: number of bins to compute variance functions / statistics
# as a function of wavelength.
#   Type: int, Required: no, Default: 20
num bins variance = 20

# num iterations: iterations to determine the mean continuum shape, LSS
# variances, etc.
#   Type: int, Required: no, Default: 5
num iterations = 5

# order: order of the polynomial for the continuum fit.
#   Type: int, Required: no, Default: 1
order = 1

# use constant weight: if True, set all delta weights to one (eta=0,
# sigma_lss=1, fudge=0).
#   Type: bool, Required: no, Default: False
use constant weight = False

# use ivar as weight: if True, use ivar as weights (eta=1, sigma_lss=fudge=0).
#   Type: bool, Required: no, Default: False
use ivar as weight = False

# [EXTRA] accepted by Dr16ExpectedFlux but absent from the notebook:
# min num qso in fit: minimum number of quasars contributing to a wavelength
# bin for it to enter the variance fit.
#   Type: int, Required: no
# min num qso in fit =

# ----------------------------------------------------------------------------
# Other available ExpectedFlux classes and their extra arguments (commented):
# ----------------------------------------------------------------------------
#
# Common to all the Dr16Fixed* variants below (in addition to
# force stack delta to zero / iter out prefix / num bins variance / order):
#   eta value: float applied to all wavelengths, or filename of eta(wavelength).
#     Type: str or float, Required: no, Default: 1.0
#   var_lss value: float applied to all wavelengths, or filename of
#     var_lss(wavelength).
#     Type: str or float, Required: no, Default: 1.0
#   fudge value: float applied to all wavelengths, or filename of
#     fudge(wavelength).
#     Type: str or float, Required: no, Default: 0.0
#
# Dr16FixedEtaExpectedFlux
#   uses: eta value, force stack delta to zero, iter out prefix,
#         limit var lss (Default 0.0,0.3), num bins variance, num iterations,
#         order
#
# Dr16FixedEtaFudgeExpectedFlux
#   uses: eta value, force stack delta to zero, fudge value, iter out prefix,
#         limit var lss, num bins variance, num iterations, order
#
# Dr16FixedEtaVarlssExpectedFlux
#   uses: eta value, force stack delta to zero, iter out prefix,
#         num bins variance, num iterations, order, var_lss value
#   (a fudge'd variant also exists adding fudge value and dropping num iterations)
#
# Dr16FixedFudgeExpectedFlux
#   uses: force stack delta to zero, fudge value, iter out prefix,
#         limit eta (Default 0.1,1.5), limit var lss, num bins variance,
#         num iterations, order
#
# Dr16FixedVarlssExpectedFlux
#   uses: force stack delta to zero, iter out prefix, limit eta,
#         num bins variance, num iterations, order, var_lss value
#
# Dr16FixedVarlssFudgeExpectedFlux
#   uses: force stack delta to zero, fudge value, iter out prefix, limit eta,
#         num bins variance, num iterations, order, var_lss value
#
# ContinuumVarianceExpectedFlux
#   iter out prefix:   Type: str, Required: no
#   num bins variance: Type: int, Required: no, Default: 20
#   order:             Type: int, Required: no, Default: 1
#   var lss file:      name of the file with the LSS variance contribution.
#                      Type: str, Required: yes
#
# TrueContinuum (for mocks with a known true continuum)
#   input directory:   directory to spectra files. Type: str, Required: yes
#   iter out prefix:   Type: str, Required: no
#   num iterations:    iterations to determine LSS variance.
#                      Type: int, Required: no, Default: 5
#   raw statistics file: file with LSS delta variance and mean transmitted flux,
#                      same format as raw-analysis output. If empty, the name is
#                      inferred from the run settings (may not work for all).
#                      Type: str, Required: no, Default: ""
#   use constant weight: set all delta weights to one (eta=0, sigma_lss=1,
#                      fudge=0). Type: bool, Required: no, Default: False
#   use splines:       if True use VAR_SPLINE / MEANFLUX_SPLINE columns,
#                      else VAR / MEANFLUX. Type: bool, Required: no, Default: True
#   recompute var lss: if True, recalculate var_lss.
#                      Type: bool, Required: no, Default: False
# ============================================================================
